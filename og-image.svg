<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Rubik, Heebo, sans-serif">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&amp;display=swap');</style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f4ed"/>
      <stop offset="1" stop-color="#ece6da"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="10" fill="#d4a017"/>

  <!-- timeline decoration, on the right (unflipped: spine left, bars to the right) -->
  <g transform="translate(808,95)">
    <rect x="120" y="20" width="5" height="400" rx="2.5" fill="#cfc7b6"/>
    <circle cx="122.5" cy="60" r="11" fill="#d4a017"/>
    <rect x="135" y="53" width="120" height="14" rx="7" fill="#8a7fc4"/>
    <circle cx="122.5" cy="135" r="11" fill="#4fb3a8"/>
    <rect x="135" y="128" width="170" height="14" rx="7" fill="#4fb3a8"/>
    <circle cx="122.5" cy="210" r="11" fill="#d4a017"/>
    <rect x="135" y="203" width="95" height="14" rx="7" fill="#8a7fc4"/>
    <circle cx="122.5" cy="285" r="11" fill="#e8c66a"/>
    <rect x="135" y="278" width="140" height="14" rx="7" fill="#4fb3a8"/>
    <circle cx="122.5" cy="360" r="11" fill="#d4a017"/>
    <rect x="135" y="353" width="110" height="14" rx="7" fill="#8a7fc4"/>
  </g>

  <!-- text block on the left; tops match the op.html layout, anchored to the
       right edge (x=756) for the RTL runs and the left edge (x=84) for the url -->
  <g text-anchor="start" dominant-baseline="text-before-edge">
    <text x="756" y="231" direction="rtl" font-size="66" font-weight="800" fill="#2b2620">ציר הזמן של חכמי ישראל</text>
    <text x="756" y="325" direction="rtl" font-size="32" font-weight="500" fill="#6b6457">תנאים · אמוראים · גאונים · ראשונים · אחרונים</text>
    <text x="756" y="376" direction="rtl" font-size="27" font-weight="400" fill="#857d6e">חיבוריהם ואירועי העולם — ציר זמן אינטראקטיבי</text>
    <text x="84" y="451" direction="ltr" font-size="24" font-weight="500" fill="#b08415">yossizahn.github.io/timeline</text>
  </g>
</svg>
